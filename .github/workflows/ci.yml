# ============================================================
# ci.yml  —  Main CI: lint, type-check, unit tests
# Runs on every push and pull request to main.
# ============================================================
name: CI — Lint, Type-Check & Unit Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────
  # JOB 1: Lint + type-check (fast, no heavy deps)
  # ──────────────────────────────────────────────
  lint:
    name: Lint & Type-Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install lint / static-analysis tools
        run: |
          pip install --upgrade pip
          pip install \
            ruff==0.4.4 \
            mypy==1.10.0 \
            nbqa==1.8.5 \
            nbformat==5.10.4

      - name: Ruff — lint src/ and tests/
        run: ruff check src/ tests/ --output-format=github

      - name: Ruff — lint notebooks (via nbqa)
        run: nbqa ruff notebooks/ --output-format=github || true
        # '|| true' keeps CI green on notebook style warnings;
        # remove to make notebook linting a hard failure.

      - name: Mypy — type-check src/
        run: |
          mypy src/ \
            --ignore-missing-imports \
            --no-strict-optional \
            --follow-imports=silent
        continue-on-error: true   # type errors are reported but don't block merge

      - name: Validate notebook JSON structure
        run: python tests/check_notebook_structure.py

  # ──────────────────────────────────────────────
  # JOB 2: Unit tests (lightweight, mocked deps)
  # ──────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install test dependencies
        run: |
          pip install --upgrade pip
          pip install \
            pytest==8.2.0 \
            pytest-cov==5.0.0 \
            pytest-timeout==2.3.1 \
            numpy scipy
          # Lightweight installs only — heavy quantum deps mocked in tests

      - name: Run unit tests
        run: |
          pytest tests/unit/ \
            -v \
            --timeout=120 \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-python${{ matrix.python-version }}
          path: coverage.xml
          retention-days: 14
