name: quantum-chem
channels:
  - defaults
  - conda-forge
dependencies:
  - python=3.11
  - numpy
  - scipy
  - matplotlib
  - seaborn
  - pandas
  - h5py
  - tqdm
  - jupyterlab
  - pip
  - pip:
    - pyscf>=2.5
    - openfermion>=1.6
    - openfermionpyscf>=0.5
    - qiskit>=1.0
    - qiskit-nature>=0.7
    - qiskit-aer>=0.14
    - qiskit-ibm-runtime>=0.20
    - pennylane>=0.38
    - pennylane-qiskit>=0.38
